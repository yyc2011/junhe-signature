<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>模板管理 — 签字页系统</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #222; }
    header {
      background: #1a1a2e; color: #fff; padding: 0 32px;
      display: flex; align-items: center; gap: 32px; height: 52px;
    }
    header h1 { font-size: 16px; font-weight: 600; margin-right: auto; }
    header a { color: #ccc; text-decoration: none; font-size: 14px; }
    header a:hover { color: #fff; }
    .container { max-width: 960px; margin: 32px auto; padding: 0 16px; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .top-bar h2 { font-size: 18px; }
    .btn {
      padding: 8px 18px; border-radius: 4px; border: 1px solid #1a1a2e;
      background: #1a1a2e; color: #fff; cursor: pointer; font-size: 14px;
      text-decoration: none;
    }
    .btn:hover { opacity: 0.85; }
    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; border: 1px solid #e0e0e0; }
    th, td { padding: 12px 16px; text-align: left; font-size: 14px; border-bottom: 1px solid #f0f0f0; }
    th { background: #fafafa; font-weight: 600; color: #555; }
    td.muted { color: #888; font-size: 13px; }
    .tag {
      display: inline-block; background: #e8f0fe; color: #1a56db;
      border-radius: 3px; padding: 2px 8px; font-size: 12px; margin: 2px 2px 2px 0;
    }
    .empty { text-align: center; color: #999; padding: 48px; background: #fff; border-radius: 8px; border: 1px solid #e0e0e0; }
    #msg { margin-bottom: 16px; padding: 10px 14px; border-radius: 4px; display: none; }
    #msg.success { background: #e6f4ea; color: #1e7e34; border: 1px solid #b7dfbe; }
    #msg.error { background: #fdecea; color: #b00020; border: 1px solid #f5c6cb; }
  </style>
</head>
<body>
  <header>
    <h1>签字页系统</h1>
    <a href="../index.html">首页</a>
    <a href="template_list.html">模板管理</a>
    <a href="project_list.html">项目管理</a>
  </header>
  <div class="container">
    <div class="top-bar">
      <h2>模板管理</h2>
      <a href="template_upload.html" class="btn">上传模板</a>
    </div>
    <div id="msg"></div>
    <div id="content"><p class="empty">加载中...</p></div>
  </div>

  <script src="../js/api.js"></script>
  <script>
    function showMsg(text, type) {
      const el = document.getElementById("msg");
      el.textContent = text;
      el.className = type;
      el.style.display = "block";
      setTimeout(() => el.style.display = "none", 4000);
    }

    async function load() {
      try {
        const templates = await api.getTemplates();
        const content = document.getElementById("content");
        if (!templates.length) {
          content.innerHTML = '<p class="empty">暂无模板，请先上传</p>';
          return;
        }
        const rows = templates.map(t => `
          <tr>
            <td>${t.name}</td>
            <td>${(t.variable_keys || []).map(v => `<span class="tag">${v.key}</span>`).join("") || "<span class='muted'>无</span>"}</td>
            <td class="muted">${t.variable_keys?.length || 0} 个</td>
            <td class="muted">${new Date(t.updated_at).toLocaleString("zh-CN")}</td>
          </tr>
        `).join("");
        content.innerHTML = `
          <table>
            <thead>
              <tr>
                <th>模板名称</th>
                <th>变量列表</th>
                <th>变量数</th>
                <th>更新时间</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        `;
      } catch (e) {
        showMsg("加载失败：" + e.message, "error");
      }
    }

    load();
  </script>
</body>
</html>
