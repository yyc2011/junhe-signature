<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>新建项目 — 签字页系统</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #222; }
    header {
      background: #1a1a2e; color: #fff; padding: 0 32px;
      display: flex; align-items: center; gap: 32px; height: 52px;
    }
    header h1 { font-size: 16px; font-weight: 600; margin-right: auto; }
    header a { color: #ccc; text-decoration: none; font-size: 14px; }
    header a:hover { color: #fff; }
    .container { max-width: 480px; margin: 60px auto; padding: 0 16px; }
    .card { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 36px; }
    h2 { font-size: 18px; margin-bottom: 24px; }
    label { display: block; font-size: 14px; color: #555; margin-bottom: 6px; }
    input[type=text] {
      width: 100%; padding: 10px 12px; border: 1px solid #ccc; border-radius: 4px;
      font-size: 14px; outline: none;
    }
    input[type=text]:focus { border-color: #1a1a2e; }
    .btn {
      display: block; width: 100%; margin-top: 20px; padding: 11px;
      border-radius: 4px; border: none; background: #1a1a2e; color: #fff;
      cursor: pointer; font-size: 14px;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn:hover:not(:disabled) { opacity: 0.85; }
    #msg { margin-top: 16px; padding: 10px 14px; border-radius: 4px; display: none; font-size: 14px; }
    #msg.success { background: #e6f4ea; color: #1e7e34; border: 1px solid #b7dfbe; }
    #msg.error { background: #fdecea; color: #b00020; border: 1px solid #f5c6cb; }
    .back { display: inline-block; margin-top: 16px; font-size: 13px; color: #888; text-decoration: none; }
    .back:hover { color: #1a1a2e; }
  </style>
</head>
<body>
  <header>
    <h1>签字页系统</h1>
    <a href="../index.html">首页</a>
    <a href="template_list.html">模板管理</a>
    <a href="project_list.html">项目管理</a>
  </header>
  <div class="container">
    <div class="card">
      <h2>新建项目</h2>
      <label for="nameInput">项目名称</label>
      <input type="text" id="nameInput" placeholder="请输入项目名称" maxlength="100">
      <button class="btn" id="submitBtn" onclick="createProject()">创建项目</button>
      <div id="msg"></div>
      <a href="project_list.html" class="back">← 返回项目列表</a>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/project_create.js"></script>
</body>
</html>
