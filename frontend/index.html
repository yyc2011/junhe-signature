<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>签字页系统</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #222; }
    header {
      background: #1a1a2e; color: #fff; padding: 0 32px;
      display: flex; align-items: center; gap: 32px; height: 52px;
    }
    header h1 { font-size: 16px; font-weight: 600; margin-right: auto; }
    header a { color: #ccc; text-decoration: none; font-size: 14px; }
    header a:hover { color: #fff; }
    .container { max-width: 960px; margin: 32px auto; padding: 0 16px; }
    .btn {
      display: inline-block; padding: 8px 18px; border-radius: 4px;
      border: 1px solid #1a1a2e; background: #1a1a2e; color: #fff;
      cursor: pointer; font-size: 14px; text-decoration: none;
    }
    .btn:hover { opacity: 0.85; }
    .hero { text-align: center; padding: 60px 0; }
    .hero h2 { font-size: 24px; margin-bottom: 12px; }
    .hero p { color: #666; margin-bottom: 28px; }
    .nav-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 24px;
    }
    .nav-card {
      background: #fff; border: 1px solid #e0e0e0; border-radius: 8px;
      padding: 28px; text-align: center;
    }
    .nav-card h3 { font-size: 16px; margin-bottom: 8px; }
    .nav-card p { color: #666; font-size: 13px; margin-bottom: 20px; }
  </style>
</head>
<body>
  <header>
    <h1>签字页系统</h1>
    <a href="index.html">首页</a>
    <a href="pages/template_list.html">模板管理</a>
    <a href="pages/project_list.html">项目管理</a>
  </header>
  <div class="container">
    <div class="hero">
      <h2>IPO 签字页批量生成系统</h2>
      <p>上传模板 → 创建项目 → 绑定模板 → 填写变量 → 批量生成 DOCX</p>
    </div>
    <div class="nav-grid">
      <div class="nav-card">
        <h3>模板管理</h3>
        <p>上传 DOCX 模板文件，系统自动解析变量占位符</p>
        <a href="pages/template_list.html" class="btn">进入模板管理</a>
      </div>
      <div class="nav-card">
        <h3>项目管理</h3>
        <p>创建签字页项目，绑定模板，填写变量，批量生成下载</p>
        <a href="pages/project_list.html" class="btn">进入项目管理</a>
      </div>
    </div>
  </div>
</body>
</html>
